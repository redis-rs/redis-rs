name: Rust

on:
  push:
    branches: [main, 0.*.x, 1.*.x]
  pull_request:
    branches: [main, 0.*.x, 1.*.x]

env:
  CARGO_TERM_COLOR: always
  REDISRS_REDIS_JSON_PATH: "/tmp/librejson.so"
  REDISRS_REDIS_SEARCH_PATH: "/tmp/redisearch.so"

concurrency:
  group: "${{ github.workflow }}-${{ github.head_ref || github.run_id || github.ref }}"
  cancel-in-progress: true

jobs:
  build-and-test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix: &db-matrix
        config: [
            # The databases to test with
            #
            # People typically test using recent versions locally. So, to be mindful of resources,
            # CI only tests against the _earliest_ minor for each major version, with latest patch.
            #
            # If minor versions are sufficiently different, CI also tests against the latest minor.
            #
            # When making changes here, also update `README.md` accordingly (grep for `CI runs against`).
            {  db-org: redis, db-name: redis, db-version: 6.2.21 },
            {  db-org: redis, db-name: redis, db-version: 7.0.15, json-module-version: v2.6.22 },
            {  db-org: redis, db-name: redis, db-version: 7.4.8, json-module-version: v2.6.22 },
            {  db-org: redis, db-name: redis, db-version: 8.0.6, json-module-version: bundled, search-module-version: bundled },
            {  db-org: redis, db-name: redis, db-version: 8.6.2, json-module-version: bundled, search-module-version: bundled },
            {  db-org: valkey-io, db-name: valkey, db-version: 7.2.12, json-module-version: v2.6.22 },
            {  db-org: valkey-io, db-name: valkey, db-version: 8.0.7, json-module-version: v2.6.22 },
            # Skipping ValKey 8.1 as it's too similar to 8.0
            {  db-org: valkey-io, db-name: valkey, db-version: 9.0.3, json-module-version: v2.6.22 },
          ]

    steps:
      - uses: actions/checkout@v6

      - name: Cache RedisJSON
        if: matrix.config.json-module-version != '' && matrix.config.json-module-version != 'bundled'
        id: cache-redisjson
        uses: actions/cache/restore@v5
        with:
          path: |
            /tmp/librejson.so
          key: ${{ runner.os }}-redisjson-${{ matrix.config.json-module-version }}

      - name: Install DB
        uses: ./.github/actions/install-db
        with:
          db-org: ${{ matrix.config.db-org }}
          db-name: ${{ matrix.config.db-name }}
          db-version: ${{ matrix.config.db-version }}

      - name: Copy bundled RedisJSON into place
        if: matrix.config.json-module-version == 'bundled'
        run: |
          cp "$HOME/db/rejson.so" "$REDISRS_REDIS_JSON_PATH"

      - name: Copy bundled RediSearch into place
        if: matrix.config.search-module-version == 'bundled'
        run: |
          cp "$HOME/db/redisearch.so" "$REDISRS_REDIS_SEARCH_PATH"

      - name: Install Rust
        uses: dtolnay/rust-toolchain/@master
        with:
          toolchain: stable
          components: rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Run tests
        run: make test

      - name: Checkout RedisJSON
        if: steps.cache-redisjson.outputs.cache-hit != 'true' && matrix.config.json-module-version != '' && matrix.config.json-module-version != 'bundled'
        uses: actions/checkout@v6
        with:
          repository: "RedisJSON/RedisJSON"
          path: "./__ci/redis-json"
          ref: ${{ matrix.config.json-module-version }}
          set-safe-directory: false

      - name: Compile RedisJSON
        if: steps.cache-redisjson.outputs.cache-hit != 'true' && matrix.config.json-module-version != '' && matrix.config.json-module-version != 'bundled'
        run: |
          cp ./Cargo.toml ./Cargo.toml.actual
          echo $'\nexclude = [\"./__ci/redis-json\"]' >> Cargo.toml
          cargo +stable build --release --manifest-path ./__ci/redis-json/Cargo.toml
          mv ./__ci/redis-json/target/release/librejson.so ${{ env.REDISRS_REDIS_JSON_PATH }}
          rm ./Cargo.toml; mv ./Cargo.toml.actual ./Cargo.toml
          rm -rf ./__ci/redis-json

      - name: Verify Redis modules
        if: matrix.config.json-module-version != '' || matrix.config.search-module-version != ''
        run: |
          verify_module() {
            local MODULE_NAME="$1"
            local MODULE_PATH="$2"
            local TEST_PORT="$3"
            shift 3  # Remove first 3 args and leave the command args
            local TEST_LOG="/tmp/redis-${MODULE_NAME}-test.log"

            echo "========================================="
            echo "Verifying ${MODULE_NAME} module"
            echo "========================================="

            if [ ! -f "$MODULE_PATH" ]; then
              echo "ERROR: ${MODULE_NAME} module not found at $MODULE_PATH"
              return 1
            fi
            ls -lh "$MODULE_PATH"

            echo "Testing Redis server with ${MODULE_NAME} module..."
            redis-server --port $TEST_PORT --loadmodule "$MODULE_PATH" \
              --logfile "$TEST_LOG" --daemonize yes || {
              echo "ERROR: Failed to start Redis with ${MODULE_NAME} module"
              cat "$TEST_LOG"
              return 1
            }

            sleep 2

            if redis-cli -p $TEST_PORT PING > /dev/null 2>&1; then
              echo "Redis server started successfully"

              # Test module-specific command
              if redis-cli -p $TEST_PORT "$@"; then
                echo "${MODULE_NAME} commands are working"
                echo "Loaded modules:"
                redis-cli -p $TEST_PORT --no-raw MODULE LIST
                redis-cli -p $TEST_PORT SHUTDOWN NOSAVE
                return 0
              else
                echo "ERROR: ${MODULE_NAME} commands not working"
                cat "$TEST_LOG"
                redis-cli -p $TEST_PORT SHUTDOWN NOSAVE
                return 1
              fi
            else
              echo "ERROR: Redis server not responding"
              cat "$TEST_LOG"
              return 1
            fi
          }

          # Verify RedisJSON if configured
          if [ -n "${{ matrix.config.json-module-version }}" ]; then
            verify_module "RedisJSON" \
              "${{ env.REDISRS_REDIS_JSON_PATH }}" \
              16379 \
              JSON.SET test '$' '{"test":1}' || exit 1
          fi

          # Verify RediSearch if configured
          if [ -n "${{ matrix.config.search-module-version }}" ]; then
            verify_module "RediSearch" \
              "${{ env.REDISRS_REDIS_SEARCH_PATH }}" \
              16380 \
              FT.CREATE testidx ON HASH SCHEMA title TEXT || exit 1
          fi

          echo "========================================="
          echo "All module verifications passed"
          echo "========================================="

      - name: Run JSON module tests
        if: matrix.config.json-module-version != ''
        run: make test-module-json

      - name: Run Search module tests
        if: matrix.config.search-module-version != ''
        run: make test-module-search

      - name: Cache RedisJSON
        if: matrix.config.json-module-version != '' && matrix.config.json-module-version != 'bundled'
        id: cache-redisjson-save
        uses: actions/cache/save@v5
        with:
          path: ${{ env.REDISRS_REDIS_JSON_PATH }}
          key: ${{ runner.os }}-redisjson-${{ matrix.config.json-module-version }}

  examples:
    needs: [lint, build-and-test]
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: *db-matrix

    steps:
      - uses: actions/checkout@v6

      - name: Install DB
        uses: ./.github/actions/install-db
        with:
          db-org: ${{ matrix.config.db-org }}
          db-name: ${{ matrix.config.db-name }}
          db-version: ${{ matrix.config.db-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain/@master
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@v2

      - name: start-redis
        run: redis-server &

      - name: basic
        run: cargo run --example basic
      - name: streams
        run: cargo run --example streams
      - name: typed
        run: cargo run --example typed --features tokio-comp
      - name: geospatial
        run: cargo run --example geospatial
      - name: async-await
        run: cargo run --example async-await --features tokio-comp
      - name: async-typed
        run: cargo run --example async-typed --features tokio-comp
      - name: async-caching
        run: cargo run --example async-caching --features tokio-comp,cache-aio
      - name: async-connection-loss
        run: cargo run --example async-connection-loss --features tokio-comp,connection-manager -- reconnect
      - name: async-multiplexed
        run: cargo run --example async-multiplexed --features tokio-comp
      - name: async-resp2-pub-sub
        run: cargo run --example async-resp2-pub-sub --features tokio-comp
      - name: async-resp3-pub-sub
        run: cargo run --example async-resp3-pub-sub --features tokio-comp,connection-manager
      - name: async-scan
        run: cargo run --example async-scan --features tokio-comp

  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: [
          {toolchain: stable},
          {toolchain: beta},
          {toolchain: nightly},
          {toolchain: 1.85.0},
        ]
    steps:
      - uses: actions/checkout@v6
      - name: lint
        uses: ./.github/actions/lint-and-check
        with:
          rust-toolchain: ${{ matrix.config.toolchain }}

      - run: cargo fmt --all -- --check
        name: fmt

      - name: doc
        run: cargo doc --all-features --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -Dwarnings

      - name: doc tests
        run: cargo test --doc --locked --all-features
        env:
          RUSTDOCFLAGS: -Dwarnings

      - name: webassembly build
        run: cargo build --target wasm32-unknown-unknown -p redis
        env:
          RUSTDOCFLAGS: -Dwarnings

      - name: Check semver
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: redis

  benchmark:
    needs: lint
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    env:
      rust_ver: stable
    steps:
      - uses: actions/checkout@v6

      - name: Install DB
        uses: ./.github/actions/install-db
        with:
          db-org: "redis"
          db-name: "redis"
          db-version: 8.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain/@master
        with:
          toolchain: ${{ env.rust_ver }}

      - uses: Swatinem/rust-cache@v2

      - name: Benchmark
        run: |
          cargo install critcmp
          cargo bench -p redis --all-features -- --measurement-time 15 --save-baseline changes
          git fetch
          git checkout ${{ github.base_ref }}
          cargo bench -p redis --all-features -- --measurement-time 15 --save-baseline base
          critcmp base changes

      # We check out again, because we switched branches in the last step.
      - uses: actions/checkout@v6

  flag-frenzy:
    needs: [lint, build-and-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain/@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2

      - run: |
          cargo install --git https://github.com/nihohit/flag-frenzy.git
          flag-frenzy --package redis

  windows-build:
    needs: [lint, build-and-test, examples]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install OpenSSL
        shell: powershell
        run: |
          vcpkg install openssl:x64-windows
          echo "OPENSSL_DIR=C:\vcpkg\packages\openssl_x64-windows" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=C:\vcpkg\packages\openssl_x64-windows\include" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=C:\vcpkg\packages\openssl_x64-windows\lib" >> $env:GITHUB_ENV

      - name: lint
        uses: ./.github/actions/lint-and-check
        with:
          rust-toolchain: stable
